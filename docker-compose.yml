version: "3.8"

# ======================================================
# 📦 DEFINICIÓN DE SERVICIOS
# ======================================================
services:
  # ======================================================
  # 🔹 SERVICIO: API (Backend Node.js)
  # ======================================================
  api:
    build: ./api
    ports:
      - "3000:3000"

    depends_on:
      - mongo

    environment:
      - MONGO_URL=mongodb://mongo:27017/noteflow

  # ======================================================
  # 🔹 SERVICIO: BASE DE DATOS (MongoDB)
  # ======================================================
  mongo:
    image: mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  # ======================================================
  # 🔹 SERVICIO: JENKINS (CON DOCKER INSTALADO)
  # ======================================================
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    # 🔸 Ahora usamos una imagen personalizada (NO la oficial directa)

    user: root
    # 🔸 Permisos necesarios para ejecutar Docker

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # 🔸 Conecta Jenkins con Docker del host

    restart: always

# ======================================================
# 💾 DEFINICIÓN DE VOLÚMENES
# ======================================================
volumes:
  mongo_data:
  jenkins_home:
